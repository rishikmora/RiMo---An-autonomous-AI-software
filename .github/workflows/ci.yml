name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/rimo

jobs:
  # --- Backend: lint + tests against a real pgvector database -----------------
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rimo
          POSTGRES_PASSWORD: rimo
          POSTGRES_DB: rimo_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U rimo -d rimo_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      SECRET_KEY: test_secret_key_at_least_32_characters_long_xx
      DATABASE_URL: postgresql+asyncpg://rimo:rimo@localhost:5432/rimo_test
      REDIS_URL: redis://localhost:6379/0
      ANTHROPIC_API_KEY: sk-ant-test-placeholder
      RATELIMIT_STORAGE_URI: memory://
      DB_POOL_SIZE: "0"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check app tests
      - name: Enable pgvector + migrate
        run: |
          python -c "import psycopg; c=psycopg.connect('postgresql://rimo:rimo@localhost:5432/rimo_test'); c.autocommit=True; c.execute('CREATE EXTENSION IF NOT EXISTS vector')"
          alembic upgrade head
      - name: Run tests
        run: pytest -q --maxfail=1

  # --- Frontend: typecheck + production build ---------------------------------
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  # --- Images: build + push to GHCR (main only) -------------------------------
  images:
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
          - name: frontend
            context: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/rimo-${{ matrix.name }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
